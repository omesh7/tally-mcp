name: Release TallyMCP

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. v0.1.0-beta)'
        required: true
        default: 'v0.1.0-beta'
      is_prerelease:
        description: 'Mark as Pre-release'
        type: boolean
        required: true
        default: true

permissions:
  contents: write

jobs:
  release:
    name: Build and Create Release
    runs-on: windows-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build Binary
      run: |
        cd tallymcp-go
        go mod tidy
        go build -ldflags="-s -w" -o tallymcp.exe .

    - name: Create GitHub Release and Upload Binary
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag_name }}
        files: tallymcp-go/tallymcp.exe
        name: TallyMCP ${{ github.event.inputs.tag_name }}
        draft: false
        prerelease: ${{ github.event.inputs.is_prerelease == 'true' || github.event.inputs.is_prerelease == true }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
