name: Go Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install dependencies
      run: |
        cd tallymcp-go
        go mod tidy

    - name: Run Vet
      run: |
        cd tallymcp-go
        go vet ./...

    - name: Run Tests
      run: |
        cd tallymcp-go
        go test -v ./...

    - name: Build Binary
      run: |
        cd tallymcp-go
        go build -o tallymcp.exe .
